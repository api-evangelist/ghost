components:
  securitySchemes:
    adminApiToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        JSON Web Token generated from an Admin API key. The key is split into
        an ID and secret at the colon separator. The ID is used as the kid
        header and the secret is used to sign the token with HS256.
  parameters:
    resourceId:
      name: id
      in: path
      required: true
      description: The unique identifier of the resource
      schema:
        type: string
        format: uuid
    includePostRelations:
      name: include
      in: query
      required: false
      description: >-
        Comma-separated list of related resources to include. Supported values
        are authors and tags.
      schema:
        type: string
    fields:
      name: fields
      in: query
      required: false
      description: >-
        Comma-separated list of fields to return in the response.
      schema:
        type: string
    filter:
      name: filter
      in: query
      required: false
      description: >-
        Apply fine-grained filters using Ghost's NQL query language.
      schema:
        type: string
    limit:
      name: limit
      in: query
      required: false
      description: >-
        Maximum number of resources to return per page. Defaults to 15.
      schema:
        oneOf:
          - type: integer
            minimum: 1
          - type: string
            enum:
              - all
        default: 15
    page:
      name: page
      in: query
      required: false
      description: >-
        Page number for paginated results. Defaults to 1.
      schema:
        type: integer
        minimum: 1
        default: 1
    order:
      name: order
      in: query
      required: false
      description: >-
        Field and direction to order results by.
      schema:
        type: string
    formats:
      name: formats
      in: query
      required: false
      description: >-
        Comma-separated list of content formats to include in the response.
      schema:
        type: string
  responses:
    Unauthorized:
      description: Authentication failed or token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Request body validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Post:
      type: object
      description: >-
        A post or page resource with all content, metadata, and relationships.
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        uuid:
          type: string
          format: uuid
          description: Universally unique identifier
        title:
          type: string
          description: Title of the post
        slug:
          type: string
          description: URL-safe slug
        lexical:
          type: string
          description: Post content in Lexical editor format (JSON string)
        html:
          type: string
          description: Rendered HTML content
        plaintext:
          type: string
          description: Plain text content
        comment_id:
          type: string
          description: Commenting system identifier
        feature_image:
          type: string
          format: uri
          description: Featured image URL
          nullable: true
        feature_image_alt:
          type: string
          description: Alt text for the featured image
          nullable: true
        feature_image_caption:
          type: string
          description: Caption for the featured image
          nullable: true
        featured:
          type: boolean
          description: Whether the post is featured
        status:
          type: string
          description: Publication status
          enum:
            - published
            - draft
            - scheduled
            - sent
        visibility:
          type: string
          description: Access visibility level
          enum:
            - public
            - members
            - paid
            - tiers
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        published_at:
          type: string
          format: date-time
          description: Publication timestamp
          nullable: true
        custom_excerpt:
          type: string
          description: Custom excerpt
          nullable: true
        codeinjection_head:
          type: string
          description: Code injection in the page head
          nullable: true
        codeinjection_foot:
          type: string
          description: Code injection in the page foot
          nullable: true
        custom_template:
          type: string
          description: Custom Handlebars template name
          nullable: true
        canonical_url:
          type: string
          format: uri
          description: Canonical URL
          nullable: true
        url:
          type: string
          format: uri
          description: Full URL on the Ghost site
        excerpt:
          type: string
          description: Auto-generated excerpt
        reading_time:
          type: integer
          description: Estimated reading time in minutes
          minimum: 0
        email_subject:
          type: string
          description: Custom email newsletter subject
          nullable: true
        frontmatter:
          type: string
          description: Custom frontmatter
          nullable: true
        og_image:
          type: string
          format: uri
          nullable: true
          description: Open Graph image URL
        og_title:
          type: string
          nullable: true
          description: Open Graph title
        og_description:
          type: string
          nullable: true
          description: Open Graph description
        twitter_image:
