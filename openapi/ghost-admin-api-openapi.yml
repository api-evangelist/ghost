        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: A list of newsletters
          content:
            application/json:
              schema:
                type: object
                properties:
                  newsletters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Newsletter'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: adminCreateNewsletter
      summary: Create a newsletter
      description: >-
        Create a new newsletter for the publication with customizable design,
        sender details, and subscription settings.
      tags:
        - Newsletters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newsletters
              properties:
                newsletters:
                  type: array
                  items:
                    $ref: '#/components/schemas/NewsletterInput'
                  minItems: 1
                  maxItems: 1
      responses:
        '201':
          description: Newsletter created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  newsletters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Newsletter'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /newsletters/{id}/:
    get:
      operationId: adminReadNewsletter
      summary: Read a newsletter by ID
      description: >-
        Retrieve a single newsletter by its unique identifier.
      tags:
        - Newsletters
      parameters:
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: A single newsletter
          content:
            application/json:
              schema:
                type: object
                properties:
                  newsletters:
                    type: array
                    items:
                      $ref: '#/components/schemas/Newsletter'
                    minItems: 1
                    maxItems: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: adminUpdateNewsletter
      summary: Update a newsletter
      description: >-
        Update an existing newsletter by its unique identifier.
      tags:
        - Newsletters
      parameters:
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
