        A paid subscription associated with a member, typically managed through
        Stripe.
      properties:
        id:
          type: string
          description: Subscription identifier
        customer:
          type: object
          description: Stripe customer details
          properties:
            id:
              type: string
              description: Stripe customer ID
            name:
              type: string
              description: Customer name
              nullable: true
            email:
              type: string
              format: email
              description: Customer email
        status:
          type: string
          description: Subscription status
          enum:
            - active
            - trialing
            - canceled
            - unpaid
            - past_due
        start_date:
          type: string
          format: date-time
          description: Subscription start date
        default_payment_card_last4:
          type: string
          description: Last 4 digits of the payment card
          nullable: true
          pattern: '^\d{4}$'
        cancel_at_period_end:
          type: boolean
          description: Whether the subscription cancels at period end
        cancellation_reason:
          type: string
          description: Reason for cancellation
          nullable: true
