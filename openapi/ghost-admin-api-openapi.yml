  /images/upload/:
    post:
      operationId: adminUploadImage
      summary: Upload an image
      description: >-
        Upload an image file to the Ghost publication. The image is uploaded as
        multipart form data and the response includes the URL where the image
        can be accessed.
      tags:
        - Images
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: The image file to upload
                purpose:
                  type: string
                  description: >-
                    Purpose of the image, such as image, profile_image, or icon
                  enum:
                    - image
                    - profile_image
                    - icon
                ref:
                  type: string
                  description: Reference identifier for the image
      responses:
        '201':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                          format: uri
                          description: URL of the uploaded image
                        ref:
                          type: string
                          description: Reference identifier
                          nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '415':
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
