        '404':
          $ref: '#/components/responses/NotFound'
  /members/:
    get:
      operationId: adminBrowseMembers
      summary: Browse members
      description: >-
        Retrieve a paginated list of publication members. Supports filtering by
        status, label, newsletter subscription, and other member properties.
      tags:
        - Members
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/filter'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/order'
      responses:
        '200':
          description: A list of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/Member'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: adminCreateMember
      summary: Create a member
      description: >-
        Create a new member. The email field is required. Optionally include
        name, labels, and newsletter subscriptions.
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - members
              properties:
                members:
                  type: array
                  items:
                    $ref: '#/components/schemas/MemberInput'
                  minItems: 1
                  maxItems: 1
      responses:
        '201':
          description: Member created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/Member'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /members/{id}/:
    get:
      operationId: adminReadMember
      summary: Read a member by ID
      description: >-
        Retrieve a single member by their unique identifier.
      tags:
        - Members
      parameters:
        - $ref: '#/components/parameters/resourceId'
        - $ref: '#/components/parameters/fields'
      responses:
        '200':
          description: A single member
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/Member'
                    minItems: 1
                    maxItems: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: adminUpdateMember
      summary: Update a member
      description: >-
        Update an existing member by their unique identifier. Can be used to
        change name, email, labels, note, and newsletter subscriptions.
      tags:
        - Members
      parameters:
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - members
              properties:
                members:
                  type: array
                  items:
                    $ref: '#/components/schemas/MemberInput'
                  minItems: 1
                  maxItems: 1
      responses:
        '200':
          description: Member updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/Member'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
