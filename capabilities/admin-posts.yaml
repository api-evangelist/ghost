naftiko: 1.0.0-alpha2
info:
  label: Ghost Admin API — Posts
  description: 'Ghost Admin API — Posts. 5 operations. Lead operation: Browse posts. Self-contained Naftiko capability covering
    one Ghost business surface.'
  tags:
  - Ghost
  - Posts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-posts
    baseUri: https://{site}.ghost.io/ghost/api/admin
    description: Ghost Admin API — Posts business capability. Self-contained, no shared references.
    resources:
    - name: posts
      path: /posts/
      operations:
      - name: adminbrowseposts
        method: GET
        description: Browse posts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: admincreatepost
        method: POST
        description: Create a post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: posts-id
      path: /posts/{id}/
      operations:
      - name: adminreadpost
        method: GET
        description: Read a post by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adminupdatepost
        method: PUT
        description: Update a post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: admindeletepost
        method: DELETE
        description: Delete a post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GHOST_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-posts-rest
    port: 8080
    description: REST adapter for Ghost Admin API — Posts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/posts
      name: posts
      description: REST surface for posts.
      operations:
      - method: GET
        name: adminbrowseposts
        description: Browse posts
        call: admin-posts.adminbrowseposts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: admincreatepost
        description: Create a post
        call: admin-posts.admincreatepost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/posts/{id}
      name: posts-id
      description: REST surface for posts-id.
      operations:
      - method: GET
        name: adminreadpost
        description: Read a post by ID
        call: admin-posts.adminreadpost
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: adminupdatepost
        description: Update a post
        call: admin-posts.adminupdatepost
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: admindeletepost
        description: Delete a post
        call: admin-posts.admindeletepost
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-posts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Admin API — Posts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: browse-posts
      description: Browse posts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-posts.adminbrowseposts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-post
      description: Create a post
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-posts.admincreatepost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-post-id
      description: Read a post by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-posts.adminreadpost
      outputParameters:
      - type: object
        mapping: $.
    - name: update-post
      description: Update a post
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-posts.adminupdatepost
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-post
      description: Delete a post
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-posts.admindeletepost
      outputParameters:
      - type: object
        mapping: $.
