naftiko: 1.0.0-alpha2
info:
  label: Ghost Content API
  description: 'Ghost Content API. 3 operations. Lead operation: Browse tags. Self-contained Naftiko capability covering one
    Ghost business surface.'
  tags:
  - Ghost
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-general
    baseUri: https://{site}.ghost.io/ghost/api/content
    description: Ghost Content API business capability. Self-contained, no shared references.
    resources:
    - name: tags
      path: /tags/
      operations:
      - name: browsetags
        method: GET
        description: Browse tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags-slug-slug
      path: /tags/slug/{slug}/
      operations:
      - name: readtagbyslug
        method: GET
        description: Read a tag by slug
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags-id
      path: /tags/{id}/
      operations:
      - name: readtagbyid
        method: GET
        description: Read a tag by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: key
      value: '{{env.GHOST_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: content-general-rest
    port: 8080
    description: REST adapter for Ghost Content API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/tags
      name: tags
      description: REST surface for tags.
      operations:
      - method: GET
        name: browsetags
        description: Browse tags
        call: content-general.browsetags
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags/slug/{slug}
      name: tags-slug-slug
      description: REST surface for tags-slug-slug.
      operations:
      - method: GET
        name: readtagbyslug
        description: Read a tag by slug
        call: content-general.readtagbyslug
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags/{id}
      name: tags-id
      description: REST surface for tags-id.
      operations:
      - method: GET
        name: readtagbyid
        description: Read a tag by ID
        call: content-general.readtagbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Content API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: browse-tags
      description: Browse tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-general.browsetags
      outputParameters:
      - type: object
        mapping: $.
    - name: read-tag-slug
      description: Read a tag by slug
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-general.readtagbyslug
      outputParameters:
      - type: object
        mapping: $.
    - name: read-tag-id
      description: Read a tag by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-general.readtagbyid
      outputParameters:
      - type: object
        mapping: $.
