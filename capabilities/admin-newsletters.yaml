naftiko: 1.0.0-alpha2
info:
  label: Ghost Admin API — Newsletters
  description: 'Ghost Admin API — Newsletters. 4 operations. Lead operation: Browse newsletters. Self-contained Naftiko capability
    covering one Ghost business surface.'
  tags:
  - Ghost
  - Newsletters
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-newsletters
    baseUri: https://{site}.ghost.io/ghost/api/admin
    description: Ghost Admin API — Newsletters business capability. Self-contained, no shared references.
    resources:
    - name: newsletters
      path: /newsletters/
      operations:
      - name: adminbrowsenewsletters
        method: GET
        description: Browse newsletters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: admincreatenewsletter
        method: POST
        description: Create a newsletter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: newsletters-id
      path: /newsletters/{id}/
      operations:
      - name: adminreadnewsletter
        method: GET
        description: Read a newsletter by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adminupdatenewsletter
        method: PUT
        description: Update a newsletter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GHOST_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-newsletters-rest
    port: 8080
    description: REST adapter for Ghost Admin API — Newsletters. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/newsletters
      name: newsletters
      description: REST surface for newsletters.
      operations:
      - method: GET
        name: adminbrowsenewsletters
        description: Browse newsletters
        call: admin-newsletters.adminbrowsenewsletters
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: admincreatenewsletter
        description: Create a newsletter
        call: admin-newsletters.admincreatenewsletter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/newsletters/{id}
      name: newsletters-id
      description: REST surface for newsletters-id.
      operations:
      - method: GET
        name: adminreadnewsletter
        description: Read a newsletter by ID
        call: admin-newsletters.adminreadnewsletter
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: adminupdatenewsletter
        description: Update a newsletter
        call: admin-newsletters.adminupdatenewsletter
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-newsletters-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Admin API — Newsletters. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: browse-newsletters
      description: Browse newsletters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-newsletters.adminbrowsenewsletters
      outputParameters:
      - type: object
        mapping: $.
    - name: create-newsletter
      description: Create a newsletter
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-newsletters.admincreatenewsletter
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-newsletter-id
      description: Read a newsletter by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-newsletters.adminreadnewsletter
      outputParameters:
      - type: object
        mapping: $.
    - name: update-newsletter
      description: Update a newsletter
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-newsletters.adminupdatenewsletter
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
