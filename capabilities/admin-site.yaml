naftiko: 1.0.0-alpha2
info:
  label: Ghost Admin API — Site
  description: 'Ghost Admin API — Site. 1 operations. Lead operation: Read site information. Self-contained Naftiko capability
    covering one Ghost business surface.'
  tags:
  - Ghost
  - Site
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-site
    baseUri: https://{site}.ghost.io/ghost/api/admin
    description: Ghost Admin API — Site business capability. Self-contained, no shared references.
    resources:
    - name: site
      path: /site/
      operations:
      - name: adminreadsite
        method: GET
        description: Read site information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GHOST_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-site-rest
    port: 8080
    description: REST adapter for Ghost Admin API — Site. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/site
      name: site
      description: REST surface for site.
      operations:
      - method: GET
        name: adminreadsite
        description: Read site information
        call: admin-site.adminreadsite
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-site-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Admin API — Site. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: read-site-information
      description: Read site information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-site.adminreadsite
      outputParameters:
      - type: object
        mapping: $.
