naftiko: 1.0.0-alpha2
info:
  label: Ghost Admin API — Pages
  description: 'Ghost Admin API — Pages. 5 operations. Lead operation: Browse pages. Self-contained Naftiko capability covering
    one Ghost business surface.'
  tags:
  - Ghost
  - Pages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-pages
    baseUri: https://{site}.ghost.io/ghost/api/admin
    description: Ghost Admin API — Pages business capability. Self-contained, no shared references.
    resources:
    - name: pages
      path: /pages/
      operations:
      - name: adminbrowsepages
        method: GET
        description: Browse pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: admincreatepage
        method: POST
        description: Create a page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pages-id
      path: /pages/{id}/
      operations:
      - name: adminreadpage
        method: GET
        description: Read a page by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adminupdatepage
        method: PUT
        description: Update a page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: admindeletepage
        method: DELETE
        description: Delete a page
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GHOST_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-pages-rest
    port: 8080
    description: REST adapter for Ghost Admin API — Pages. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/pages
      name: pages
      description: REST surface for pages.
      operations:
      - method: GET
        name: adminbrowsepages
        description: Browse pages
        call: admin-pages.adminbrowsepages
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: admincreatepage
        description: Create a page
        call: admin-pages.admincreatepage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pages/{id}
      name: pages-id
      description: REST surface for pages-id.
      operations:
      - method: GET
        name: adminreadpage
        description: Read a page by ID
        call: admin-pages.adminreadpage
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: adminupdatepage
        description: Update a page
        call: admin-pages.adminupdatepage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: admindeletepage
        description: Delete a page
        call: admin-pages.admindeletepage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-pages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Admin API — Pages. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: browse-pages
      description: Browse pages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-pages.adminbrowsepages
      outputParameters:
      - type: object
        mapping: $.
    - name: create-page
      description: Create a page
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-pages.admincreatepage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-page-id
      description: Read a page by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-pages.adminreadpage
      outputParameters:
      - type: object
        mapping: $.
    - name: update-page
      description: Update a page
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-pages.adminupdatepage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-page
      description: Delete a page
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-pages.admindeletepage
      outputParameters:
      - type: object
        mapping: $.
