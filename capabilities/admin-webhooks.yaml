naftiko: 1.0.0-alpha2
info:
  label: Ghost Admin API — Webhooks
  description: 'Ghost Admin API — Webhooks. 3 operations. Lead operation: Create a webhook. Self-contained Naftiko capability
    covering one Ghost business surface.'
  tags:
  - Ghost
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-webhooks
    baseUri: https://{site}.ghost.io/ghost/api/admin
    description: Ghost Admin API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks
      path: /webhooks/
      operations:
      - name: admincreatewebhook
        method: POST
        description: Create a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-id
      path: /webhooks/{id}/
      operations:
      - name: adminupdatewebhook
        method: PUT
        description: Update a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: admindeletewebhook
        method: DELETE
        description: Delete a webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GHOST_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-webhooks-rest
    port: 8080
    description: REST adapter for Ghost Admin API — Webhooks. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: POST
        name: admincreatewebhook
        description: Create a webhook
        call: admin-webhooks.admincreatewebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/{id}
      name: webhooks-id
      description: REST surface for webhooks-id.
      operations:
      - method: PUT
        name: adminupdatewebhook
        description: Update a webhook
        call: admin-webhooks.adminupdatewebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: admindeletewebhook
        description: Delete a webhook
        call: admin-webhooks.admindeletewebhook
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Admin API — Webhooks. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-webhook
      description: Create a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-webhooks.admincreatewebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-webhook
      description: Update a webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-webhooks.adminupdatewebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete a webhook
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-webhooks.admindeletewebhook
      outputParameters:
      - type: object
        mapping: $.
