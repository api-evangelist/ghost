naftiko: 1.0.0-alpha2
info:
  label: Ghost Admin API — Offers
  description: 'Ghost Admin API — Offers. 4 operations. Lead operation: Browse offers. Self-contained Naftiko capability covering
    one Ghost business surface.'
  tags:
  - Ghost
  - Offers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-offers
    baseUri: https://{site}.ghost.io/ghost/api/admin
    description: Ghost Admin API — Offers business capability. Self-contained, no shared references.
    resources:
    - name: offers
      path: /offers/
      operations:
      - name: adminbrowseoffers
        method: GET
        description: Browse offers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: admincreateoffer
        method: POST
        description: Create an offer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: offers-id
      path: /offers/{id}/
      operations:
      - name: adminreadoffer
        method: GET
        description: Read an offer by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adminupdateoffer
        method: PUT
        description: Update an offer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.GHOST_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-offers-rest
    port: 8080
    description: REST adapter for Ghost Admin API — Offers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/offers
      name: offers
      description: REST surface for offers.
      operations:
      - method: GET
        name: adminbrowseoffers
        description: Browse offers
        call: admin-offers.adminbrowseoffers
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: admincreateoffer
        description: Create an offer
        call: admin-offers.admincreateoffer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/offers/{id}
      name: offers-id
      description: REST surface for offers-id.
      operations:
      - method: GET
        name: adminreadoffer
        description: Read an offer by ID
        call: admin-offers.adminreadoffer
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: adminupdateoffer
        description: Update an offer
        call: admin-offers.adminupdateoffer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-offers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Admin API — Offers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: browse-offers
      description: Browse offers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-offers.adminbrowseoffers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-offer
      description: Create an offer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-offers.admincreateoffer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-offer-id
      description: Read an offer by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-offers.adminreadoffer
      outputParameters:
      - type: object
        mapping: $.
    - name: update-offer
      description: Update an offer
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-offers.adminupdateoffer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
