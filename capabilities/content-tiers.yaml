naftiko: 1.0.0-alpha2
info:
  label: Ghost Content API — Tiers
  description: 'Ghost Content API — Tiers. 2 operations. Lead operation: Browse tiers. Self-contained Naftiko capability covering
    one Ghost business surface.'
  tags:
  - Ghost
  - Tiers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: content-tiers
    baseUri: https://{site}.ghost.io/ghost/api/content
    description: Ghost Content API — Tiers business capability. Self-contained, no shared references.
    resources:
    - name: tiers
      path: /tiers/
      operations:
      - name: browsetiers
        method: GET
        description: Browse tiers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tiers-id
      path: /tiers/{id}/
      operations:
      - name: readtierbyid
        method: GET
        description: Read a tier by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: key
      value: '{{env.GHOST_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: content-tiers-rest
    port: 8080
    description: REST adapter for Ghost Content API — Tiers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tiers
      name: tiers
      description: REST surface for tiers.
      operations:
      - method: GET
        name: browsetiers
        description: Browse tiers
        call: content-tiers.browsetiers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tiers/{id}
      name: tiers-id
      description: REST surface for tiers-id.
      operations:
      - method: GET
        name: readtierbyid
        description: Read a tier by ID
        call: content-tiers.readtierbyid
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: content-tiers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Content API — Tiers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: browse-tiers
      description: Browse tiers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-tiers.browsetiers
      outputParameters:
      - type: object
        mapping: $.
    - name: read-tier-id
      description: Read a tier by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: content-tiers.readtierbyid
      outputParameters:
      - type: object
        mapping: $.
