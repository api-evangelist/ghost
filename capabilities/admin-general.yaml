naftiko: 1.0.0-alpha2
info:
  label: Ghost Admin API
  description: 'Ghost Admin API. 5 operations. Lead operation: Browse tags. Self-contained Naftiko capability covering one
    Ghost business surface.'
  tags:
  - Ghost
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GHOST_API_KEY: GHOST_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-general
    baseUri: https://{site}.ghost.io/ghost/api/admin
    description: Ghost Admin API business capability. Self-contained, no shared references.
    resources:
    - name: tags
      path: /tags/
      operations:
      - name: adminbrowsetags
        method: GET
        description: Browse tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: admincreatetag
        method: POST
        description: Create a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tags-id
      path: /tags/{id}/
      operations:
      - name: adminreadtag
        method: GET
        description: Read a tag by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: adminupdatetag
        method: PUT
        description: Update a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: admindeletetag
        method: DELETE
        description: Delete a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GHOST_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-general-rest
    port: 8080
    description: REST adapter for Ghost Admin API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/tags
      name: tags
      description: REST surface for tags.
      operations:
      - method: GET
        name: adminbrowsetags
        description: Browse tags
        call: admin-general.adminbrowsetags
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: admincreatetag
        description: Create a tag
        call: admin-general.admincreatetag
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags/{id}
      name: tags-id
      description: REST surface for tags-id.
      operations:
      - method: GET
        name: adminreadtag
        description: Read a tag by ID
        call: admin-general.adminreadtag
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: adminupdatetag
        description: Update a tag
        call: admin-general.adminupdatetag
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: admindeletetag
        description: Delete a tag
        call: admin-general.admindeletetag
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Ghost Admin API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: browse-tags
      description: Browse tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-general.adminbrowsetags
      outputParameters:
      - type: object
        mapping: $.
    - name: create-tag
      description: Create a tag
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-general.admincreatetag
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: read-tag-id
      description: Read a tag by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-general.adminreadtag
      outputParameters:
      - type: object
        mapping: $.
    - name: update-tag
      description: Update a tag
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-general.adminupdatetag
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tag
      description: Delete a tag
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-general.admindeletetag
      outputParameters:
      - type: object
        mapping: $.
