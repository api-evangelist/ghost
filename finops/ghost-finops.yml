specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ghost
providerId: ghost
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Publishing
- Open Source
- FinOps
- Cost Management
- FOCUS
description: FOCUS-aligned FinOps profile for Ghost — open-source software with a hosted Ghost(Pro) tier.
notes: >-
  Ghost software is MIT-licensed and free to self-host (you pay only your infrastructure
  costs). Ghost(Pro) is a flat-rate subscription with member-count breakpoints. APIs are
  included with both options.
sources:
- https://ghost.org/pricing/
- https://github.com/TryGhost/Ghost
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Ghost Foundation
serviceCategory: Publishing
billingModel:
  pricingCategory: Subscription (Ghost(Pro)) or Self-Hosted Open Source
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Ghost(Pro) Hosting
  ServiceCategory: Publishing
  ProviderName: Ghost
  PublisherName: Ghost Foundation
  InvoiceIssuerName: Ghost Foundation
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: plan_subscription
  description: Monthly/annual plan fee for Ghost(Pro).
  unit: months
  aggregation: sum
  dimensions:
  - plan_tier
- name: members
  description: Member count drives plan-tier breakpoints.
  unit: members
  aggregation: max
  dimensions:
  - account
- name: self_host_infrastructure
  description: When self-hosting, infrastructure costs (compute, storage, email) replace plan fees.
  unit: varies
  aggregation: sum
  dimensions:
  - cloud_provider
  - region
principles:
- name: Visibility
  description: Track Ghost(Pro) invoices or self-host infra spend; correlate to member growth and email volume.
- name: Allocation
  description: Allocate publishing spend to the content/marketing cost center.
- name: Optimization
  description: For high-volume publishers, evaluate self-hosted vs. Ghost(Pro) at each tier breakpoint; manage email-send infrastructure costs.
- name: Accountability
  description: Assign a publishing-ops owner to review tier vs. members quarterly.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
