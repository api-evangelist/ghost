specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ghost
providerId: ghost
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Content Management
  - Publishing
  - SaaS
description: 'FOCUS-aligned FinOps for Ghost(Pro): tiered SaaS subscription priced on staff seats, included
  members, and feature access; no per-API-call billing.'
sources:
  - https://ghost.org/pricing/
  - https://ghost.org/docs/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Ghost Foundation
serviceCategory: Content Management / Publishing
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Ghost(Pro)
  ServiceCategory: Content Management
  ProviderName: Ghost
  PublisherName: Ghost Foundation
  InvoiceIssuerName: Ghost Foundation
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription
  PricingUnit: month
meters:
  - name: subscription_fees
    description: Monthly Ghost(Pro) plan fee charged per blog/site
    unit: month
    aggregation: sum
    dimensions:
      - plan
      - site_id
  - name: staff_seats
    description: Number of staff users included on the plan
    unit: seat
    aggregation: max
    dimensions:
      - plan
  - name: members_included
    description: Number of paid/free members the plan supports
    unit: member
    aggregation: max
    dimensions:
      - plan
  - name: newsletters
    description: Number of newsletters configured under the plan
    unit: newsletter
    aggregation: max
  - name: file_storage
    description: Cumulative file uploads bound by the per-file size cap of the plan
    unit: GB
    aggregation: sum
principles:
  - name: Visibility
    description: Track Ghost(Pro) invoices via the billing email and admin Settings - Subscription pages;
      surface seat counts and active member totals through the Admin API for finance reporting.
  - name: Allocation
    description: Tag site-level subscriptions to the owning content team; multi-property publishers should
      attribute each Ghost(Pro) instance to its content unit.
  - name: Optimization
    description: Annual billing offers material discount over monthly; consolidate low-traffic sites onto
      a single Creator/Team plan rather than maintaining multiple Starters; archive inactive members to
      stay within tier caps.
  - name: Accountability
    description: Editorial leads own the Ghost(Pro) seat allocation and member-tier expansion decisions;
      finance reviews annual renewal vs self-host trade-off.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
