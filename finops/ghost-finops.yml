      - Integrations
      - Notifications
      - Webhooks
    serviceName: Ghost Webhooks
    serviceCategory: API
  - name: Ghost Content API JavaScript Client
    baseURL: https://api.example.com
    tags:
      - Client Library
      - Content Management
      - JavaScript
      - Node.js
      - SDK
    serviceName: Ghost Content API JavaScript Client
